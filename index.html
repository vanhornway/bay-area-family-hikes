<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Discover 24+ family-friendly hiking trails in the Bay Area. Filter by season, find nearby food, and plan your next Sunday adventure.">
  <meta name="theme-color" content="#0f172a">
  <title>Bay Area Sunday Adventures - 24+ Family Hikes</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-content">
      <h1 class="site-title">🥾 Bay Area Sunday Adventures</h1>
      <p class="site-subtitle">24+ Family Hikes • 3-5 Miles • Epic Views</p>
      <div class="header-actions">
        <button id="random-hike-btn" class="btn btn-primary">🎲 Pick Our Sunday Hike</button>
      </div>
    </div>
  </header>

  <main class="container">
    <!-- Interactive Map Section -->
    <section class="map-section">
      <div id="hike-map" class="hike-map"></div>
      <div class="map-overlay">
        <p>📍 Click a pin to jump to hike details</p>
      </div>
    </section>

    <nav class="season-nav" aria-label="Season navigation">
      <ul class="season-list">
        <li><a href="#spring" class="season-link">Spring</a></li>
        <li><a href="#summer" class="season-link">Summer</a></li>
        <li><a href="#fall" class="season-link">Fall</a></li>
        <li><a href="#winter" class="season-link">Winter</a></li>
      </ul>
    </nav>

    <div id="app" class="hike-grid-container">
      <!-- Hikes will be injected here by script.js -->
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Loading adventures...</p>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Bay Area Sunday Adventures. Happy Trails!</p>
  </footer>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <!-- App Script -->
  <script src="script.js"></script>
</body>
</html>
